name: Quality

on:
  pull_request:
  push:
    branches:
      - "codex/**"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
        QUALITY_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        QUALITY_DEFAULT_BASE_REF: origin/${{ github.event.repository.default_branch }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Report toolchain
        run: node --version && npm --version && node -p "require('./package.json').version"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:test
      - run: npm run quality:file-policy
      - run: npm run quality:changed-lint
      - run: npm test -- --silent=passed-only
